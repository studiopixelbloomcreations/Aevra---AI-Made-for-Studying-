<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Create account - Aura AI</title>
  <link rel="icon" href="public/aura-icon.png" type="image/png">
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <main class="login-root gemini-auth" role="main" aria-labelledby="signupTitle">
    <section class="login-card gemini-auth-card">
      <header class="card-header">
        <img src="public/aura-logo.png" alt="Aura AI" class="auth-logo-img" />
        <h1 id="signupTitle">Create your Aura account</h1>
        <p class="muted">Sign up with Google, then Aura will build your unique profile.</p>
      </header>

      <form id="signupForm" class="login-form" novalidate>
        <label for="name" class="sr">Full name</label>
        <input id="name" name="name" type="text" placeholder="Full name" autocomplete="name" />

        <label for="email" class="sr">Email</label>
        <input id="email" name="email" type="email" placeholder="Email" autocomplete="email" />

        <label for="password" class="sr">Password</label>
        <input id="password" name="password" type="password" placeholder="Create a password" minlength="6" />

        <label for="confirm" class="sr">Confirm password</label>
        <input id="confirm" name="confirm" type="password" placeholder="Confirm password" minlength="6" />

        <label class="remember">
          <input type="checkbox" id="terms" name="terms" checked />
          <span>I agree to the terms</span>
        </label>

        <button type="button" class="btn-social gemini-google" data-provider="google">
          <span class="google-dot">G</span>
          <span>Continue with Google</span>
        </button>

        <button type="submit" class="btn-primary">Create account</button>

        <p class="small muted">
          Already have an account? <a href="login.html?return=app.html">Log in</a> · <a href="index.html">Back to landing</a>
        </p>
      </form>
      <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <script src="firebase_runtime_config.js"></script>
  <script src="signup.js" defer></script>
</body>
</html>
