<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Log in - Aura AI</title>
  <link rel="icon" href="public/aura-icon.png" type="image/png">
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <main class="login-root gemini-auth" role="main" aria-labelledby="loginTitle">
    <section class="login-card gemini-auth-card">
      <header class="card-header">
        <img src="public/aura-logo.png" alt="Aura AI" class="auth-logo-img" />
        <h1 id="loginTitle">Log in to Aura</h1>
        <p class="muted">Continue with Google to unlock your private Aura intelligence.</p>
      </header>

      <form id="loginForm" class="login-form" novalidate>
        <label for="email" class="sr">Email</label>
        <input id="email" name="email" type="email" placeholder="Email" autocomplete="email" />

        <label for="password" class="sr">Password</label>
        <input id="password" name="password" type="password" placeholder="Password" autocomplete="current-password" />

        <button type="button" class="btn-social gemini-google" data-provider="google">
          <span class="google-dot">G</span>
          <span>Continue with Google</span>
        </button>

        <button type="submit" class="btn-primary">Continue with email</button>

        <p class="small muted">
          New to Aura? <a href="signup.html?return=app.html">Create account</a> · <a href="index.html">Back to landing</a>
        </p>
      </form>
      <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <script src="firebase_runtime_config.js"></script>
  <script src="login.js" defer></script>
</body>
</html>
